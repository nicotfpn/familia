<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e8eaed">
<meta name="description" content="Lista de compras — estilo planilha">
<title>Lista de Compras</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Cascadia Code','Consolas',monospace;

  --bg:#e8eaed;
  --surface:#fff;
  --header-bg:#f1f3f4;

  --border:#c4c7c5;
  --border-light:#dadce0;
  --border-faint:#e8eaed;

  --accent:#0d47a1;
  --accent-light:#e3edf7;
  --accent-mid:#8ab4d4;
  --red:#c5221f;
  --red-light:#fce8e6;
  --blue:#1a73e8;
  --blue-light:#e8f0fe;
  --ink:#1f1f1f;
  --ink-muted:#5f6368;
  --ink-soft:#80868b;

  --row-hover:#f8f9fa;
  --radius:4px;

  --cell-pad:8px 10px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  font-size:14px;
  line-height:1.5;
}

.page{
  max-width:720px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0);
}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.topbar-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 12px;
  background:var(--header-bg);
  border-bottom:1px solid var(--border-light);
}
.topbar-title h1{
  font-size:0.85rem;
  font-weight:600;
  letter-spacing:0.02em;
  color:var(--ink);
  text-transform:uppercase;
}
.topbar-title h1 .accent{color:var(--accent);}
#contador{
  font-family:var(--font-mono);
  font-size:0.7rem;
  color:var(--ink-muted);
}

/* ===== TOOLBAR ===== */
.toolbar{
  padding:8px 12px;
  display:flex;
  gap:6px;
  align-items:center;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.toolbar input[type="text"]{
  flex:1;
  min-width:0;
  font-family:var(--font);
  font-size:0.85rem;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  color:var(--ink);
  outline:none;
  transition:border-color 0.15s;
}
.toolbar input[type="text"]:focus{border-color:var(--accent);}
.toolbar input[type="text"]::placeholder{color:var(--ink-soft);}

.qtd-group{
  display:flex;
  align-items:center;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  flex-shrink:0;
}
.qtd-group button{
  width:28px;
  height:30px;
  border:none;
  background:transparent;
  color:var(--accent);
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  font-family:var(--font);
}
.qtd-group button:active{background:var(--accent-light);}
.qtd-group .qtd-input{
  font-family:var(--font-mono);
  font-size:0.8rem;
  width:34px;
  text-align:center;
  color:var(--ink);
  border:none;
  background:transparent;
  outline:none;
  padding:0;
  -moz-appearance:textfield;
}
.qtd-group .qtd-input::-webkit-inner-spin-button,
.qtd-group .qtd-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

.add-btn{
  flex-shrink:0;
  height:30px;
  padding:0 14px;
  border:none;
  border-radius:var(--radius);
  background:var(--accent);
  color:#fff;
  font-size:0.8rem;
  font-weight:600;
  cursor:pointer;
  transition:background 0.15s;
  font-family:var(--font);
}
.add-btn:active{background:#093170;}

/* ===== ACTIONS BAR ===== */
.actions-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  padding:4px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  min-height:30px;
  flex-wrap:wrap;
}
.actions-left{
  display:flex;
  align-items:center;
  gap:4px;
  flex-wrap:wrap;
}
.actions-right{
  display:flex;
  align-items:center;
  gap:4px;
}
.status-dot{
  width:6px;height:6px;border-radius:1px;
  background:var(--accent);
  flex-shrink:0;
  transition:background 0.2s;
}
.status-dot.saving{background:#f9ab00;animation:pulse 1s ease-in-out infinite;}
.status-dot.erro{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#status-texto{
  font-family:var(--font-mono);
  font-size:0.6rem;
  color:var(--ink-soft);
  letter-spacing:0.02em;
}

.act-btn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  height:24px;
  padding:0 8px;
  border:1px solid var(--border-light);
  border-radius:var(--radius);
  background:var(--surface);
  color:var(--ink-muted);
  font-family:var(--font);
  font-size:0.7rem;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
  transition:all 0.12s;
}
.act-btn:active{background:var(--header-bg);border-color:var(--border);}
.act-btn .ico{font-size:0.75rem;line-height:1;}
.act-btn.highlight{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
#feedback-copy{
  font-family:var(--font-mono);
  font-size:0.6rem;
  color:var(--accent);
  opacity:0;
  transition:opacity 0.2s;
  pointer-events:none;
}
#feedback-copy.show{opacity:1;}

/* ===== SPREADSHEET ===== */
.sheet{
  flex:1;
  overflow-x:auto;
  padding:0;
}
.sheet-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
.sheet-table th{
  font-family:var(--font-mono);
  font-size:0.65rem;
  font-weight:500;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--ink-muted);
  background:var(--header-bg);
  border-bottom:2px solid var(--border);
  padding:var(--cell-pad);
  text-align:left;
  position:sticky;
  top:0;
  z-index:2;
  user-select:none;
}
.sheet-table th:not(:last-child){border-right:1px solid var(--border-faint);}
.sheet-table th.sorted{
  color:var(--ink);
  background:#e8eaed;
}
.sheet-table th.sortable{
  cursor:pointer;
}
.sheet-table th.sortable:active{background:#dadce0;}
.sort-arrow{
  display:inline-block;
  margin-left:3px;
  font-size:0.6rem;
  opacity:0.5;
}
th.sorted .sort-arrow{opacity:1;}

.sheet-table td{
  padding:var(--cell-pad);
  border-bottom:1px solid var(--border-faint);
  vertical-align:middle;
  background:var(--surface);
  transition:background 0.1s;
}
.sheet-table tr:hover td{background:var(--row-hover);}
.sheet-table td:not(:last-child){border-right:1px solid var(--border-faint);}

.col-check{width:42px;text-align:center !important;}
.col-qtd{width:60px;text-align:center !important;}
.col-acao{width:38px;text-align:center !important;}
.col-item{}

.item-text{
  font-size:0.88rem;
  color:var(--ink);
  word-break:break-word;
  display:inline-block;
  position:relative;
  line-height:1.4;
  padding-left:2px;
}
.item.feito .item-text{
  color:var(--ink-soft);
  text-decoration:line-through;
  text-decoration-color:var(--red);
  text-decoration-thickness:2px;
}

.qtd-val{
  font-family:var(--font-mono);
  font-size:0.82rem;
  color:var(--ink);
}
.item.feito .qtd-val{color:var(--ink-soft);}

.cb-excel{
  width:18px;height:18px;
  border:2px solid var(--border);
  border-radius:2px;
  background:var(--surface);
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:all 0.1s;
  flex-shrink:0;
  position:relative;
}
.cb-excel:active{border-color:var(--accent);}
.item.feito .cb-excel{
  background:var(--accent);
  border-color:var(--accent);
}
.cb-excel svg{
  width:11px;height:11px;
  stroke:#fff;
  stroke-width:3;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
  display:block;
}

.del-cell{
  width:26px;height:26px;
  border:none;
  background:transparent;
  color:var(--ink-soft);
  font-size:0.9rem;
  cursor:pointer;
  border-radius:var(--radius);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:all 0.1s;
}
.del-cell:hover{background:var(--red-light);color:var(--red);}

/* ===== SECTION ===== */
.section-head td{
  background:var(--accent-light) !important;
  border-bottom:1px solid var(--accent-mid) !important;
  padding:4px 10px !important;
  font-family:var(--font-mono);
  font-size:0.6rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--accent);
  border-right:none !important;
}
.section-head:hover td{background:var(--accent-light) !important;}
.section-head td:last-child{border-right:none !important;}

.clear-row{
  text-align:center;
  padding:10px 0 20px;
}
.clear-btn{
  border:none;
  background:none;
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--red);
  padding:6px 12px;
  cursor:pointer;
  border-radius:var(--radius);
}
.clear-btn:active{background:var(--red-light);}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-muted);
}
.empty-state .ico{font-size:2rem;display:block;margin-bottom:8px;opacity:0.5;}
.empty-state p{font-size:0.85rem;}

.banner{
  margin:8px 12px 0;
  padding:8px 12px;
  background:var(--red-light);
  border:1px solid rgba(197,34,31,0.25);
  border-radius:var(--radius);
  color:var(--red);
  font-size:0.75rem;
  line-height:1.4;
  display:none;
}
.banner.show{display:block;}

@keyframes rowIn{
  from{opacity:0;transform:translateY(-4px);}
  to{opacity:1;transform:none;}
}
.sheet-table tbody tr{animation:rowIn 0.2s ease-out;}

/* ===== RESPONSIVE ===== */
@media (max-width:500px){
  .col-qtd{width:48px;}
  .col-check{width:36px;}
  .col-acao{width:32px;}
  .sheet-table th,.sheet-table td{padding:6px 6px;}
  .topbar-title{padding:4px 8px;}
  .toolbar{padding:6px 8px;}
  .actions-bar{padding:3px 8px;}
}
@media (min-width:768px){
  .page{max-width:860px;padding:0 24px;}
  .topbar-title{padding:8px 16px;}
  .topbar-title h1{font-size:0.95rem;}
  #contador{font-size:0.75rem;}
  .toolbar{padding:12px 16px;gap:10px;}
  .toolbar input[type="text"]{font-size:0.95rem;padding:10px 14px;}
  .add-btn{height:38px;padding:0 22px;font-size:0.85rem;}
  .qtd-group button{width:34px;height:38px;font-size:1.1rem;}
  .qtd-group .qtd-input{font-size:0.9rem;width:38px;}
  .actions-bar{padding:6px 16px;}
  .act-btn{height:28px;padding:0 12px;font-size:0.75rem;}
  .item-text{font-size:0.95rem;}
  .sheet-table th{font-size:0.7rem;}
  .sheet-table td{padding:12px 14px;}
  .col-qtd{width:72px;}
  body{font-size:15px;}
}
@media (min-width:1024px){
  .page{max-width:1100px;padding:0 32px;}
  .topbar-title{padding:10px 20px;}
  .toolbar{padding:14px 20px;gap:12px;}
  .toolbar input[type="text"]{font-size:1rem;padding:10px 16px;}
  .add-btn{height:40px;padding:0 28px;font-size:0.9rem;border-radius:6px;}
  .qtd-group button{width:36px;height:40px;font-size:1.15rem;}
  .qtd-group .qtd-input{font-size:0.95rem;width:42px;}
  .actions-bar{padding:8px 20px;}
  .act-btn{height:30px;padding:0 14px;font-size:0.78rem;border-radius:6px;}
  .item-text{font-size:1rem;}
  .sheet-table th{font-size:0.75rem;padding:12px 16px;}
  .sheet-table td{padding:14px 16px;}
  .col-qtd{width:80px;}
  .col-check{width:48px;}
  .col-acao{width:44px;}
  body{font-size:15px;}
}

/* ===== PRINT ===== */
@media print{
  body{background:#fff;font-size:12pt;}
  .topbar,.toolbar,.actions-bar,.banner,.del-cell,.cb-excel,.clear-row,.section-head{display:none !important;}
  .page{max-width:100%;padding:0;min-height:auto;}
  .sheet{overflow:visible;}
  .sheet-table{page-break-after:auto;}
  .sheet-table th{
    background:#f0f0f0 !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    position:static;
    border-bottom:2px solid #000;
    color:#000;
    font-size:8pt;
  }
  .sheet-table td{
    border-bottom:1px solid #ccc;
    background:#fff !important;
    padding:6px 8px;
    font-size:10pt;
  }
  .sheet-table tr:hover td{background:#fff !important;}
  .item.feito .item-text{
    color:#999 !important;
  }
  .item-text{font-size:10pt;}
  .qtd-val{font-size:9pt;}
  .col-check{width:30px;}
  .col-acao{width:20px;}
  .col-qtd{width:50px;}
  .empty-state{display:none;}
  .sheet-table tbody tr{animation:none !important;}
}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.001ms !important;transition-duration:0.001ms !important;}
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-title">
      <h1>Lista de <span class="accent">Compras</span></h1>
      <span id="contador">carregando…</span>
    </div>

    <div class="toolbar">
      <input type="text" id="input-texto" placeholder="Novo item…" maxlength="80" required>
      <div class="qtd-group">
        <button type="button" id="qtd-menos" aria-label="Diminuir">−</button>
        <input type="number" id="qtd-valor" class="qtd-input" value="1" min="1" max="99">
        <button type="button" id="qtd-mais" aria-label="Aumentar">+</button>
      </div>
      <button type="button" class="add-btn" id="btn-adicionar">Adicionar</button>
    </div>

    <div class="actions-bar">
      <div class="actions-left">
        <button class="act-btn" id="btn-copiar"><span class="ico">📄</span> Copiar TXT</button>
        <button class="act-btn" id="btn-imprimir"><span class="ico">🖨️</span> Imprimir</button>
        <span id="feedback-copy">Copiado!</span>
      </div>
      <div class="actions-right">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-texto">sincronizado</span>
      </div>
    </div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="sheet" id="sheet">
    <div class="empty-state"><span class="ico">📋</span><p>Lista vazia</p></div>
  </div>
</div>

<script>
const API = '/api/lista';
const CACHE_KEY = 'lista-familia-cache-v1';
let itens = [];
let qtdAtual = 1;
let salvando = false;
let pendente = false;
let sortBy = 'criadoEm';
let sortDir = 'asc';

const $ = (id) => document.getElementById(id);
const sheet = $('sheet');
const contador = $('contador');
const statusDot = $('status-dot');
const statusTexto = $('status-texto');
const banner = $('banner');
const feedbackCopy = $('feedback-copy');

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function mostrarBanner(msg){
  banner.textContent = msg;
  banner.classList.add('show');
}

function setStatus(estado){
  statusDot.className = 'status-dot' + (estado === 'ok' ? '' : ' ' + estado);
  statusTexto.textContent = estado === 'ok' ? 'sincronizado'
    : estado === 'saving' ? 'salvando…'
    : 'erro ao salvar';
}

function salvarCache(){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(itens)); } catch(e) {}
}

function carregarCache(){
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) { itens = JSON.parse(raw); render(); }
  } catch(e) {}
}

function comparar(a, b){
  let diff;
  if (sortBy === 'texto') diff = a.texto.localeCompare(b.texto, 'pt-BR');
  else if (sortBy === 'qtd') diff = a.qtd - b.qtd;
  else diff = a.criadoEm - b.criadoEm;
  return sortDir === 'asc' ? diff : -diff;
}

function setSort(campo){
  if (sortBy === campo){
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortBy = campo;
    sortDir = campo === 'texto' ? 'asc' : (campo === 'qtd' ? 'desc' : 'asc');
  }
  render();
}

function sortArrow(campo){
  if (sortBy !== campo) return '';
  return sortDir === 'asc' ? ' ▲' : ' ▼';
}

function gerarTexto(){
  const pendentes = itens.filter(i => !i.feito);
  const comprados = itens.filter(i => i.feito);
  const linhas = [];
  linhas.push('LISTA DE COMPRAS');
  linhas.push('━'.repeat(30));
  linhas.push('');
  if (pendentes.length){
    linhas.push('📌 PRA COMPRAR');
    pendentes.forEach((item, i) => {
      linhas.push(`  ${i+1}. ${item.texto}${item.qtd > 1 ? ` (qtd: ${item.qtd})` : ''}`);
    });
    linhas.push('');
  }
  if (comprados.length){
    linhas.push('✅ NO CARRINHO');
    comprados.forEach((item, i) => {
      linhas.push(`  ${i+1}. ${item.texto}${item.qtd > 1 ? ` (qtd: ${item.qtd})` : ''}`);
    });
    linhas.push('');
  }
  if (!itens.length){
    linhas.push('  (lista vazia)');
    linhas.push('');
  }
  linhas.push('━'.repeat(30));
  return linhas.join('\n');
}

function copiarTxt(){
  const texto = gerarTexto();
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(texto).then(() => mostrarCopiado());
  } else {
    const ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); mostrarCopiado(); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function mostrarCopiado(){
  feedbackCopy.classList.add('show');
  setTimeout(() => feedbackCopy.classList.remove('show'), 2000);
}

function render(){
  const cmp = (a, b) => {
    let diff;
    if (sortBy === 'texto') diff = a.texto.localeCompare(b.texto, 'pt-BR');
    else if (sortBy === 'qtd') diff = a.qtd - b.qtd;
    else diff = a.criadoEm - b.criadoEm;
    return sortDir === 'asc' ? diff : -diff;
  };

  const pendentes = itens.filter(i => !i.feito).sort(cmp);
  const comprados = itens.filter(i => i.feito).sort(cmp);

  contador.textContent = itens.length === 0 ? 'nenhum item'
    : `${pendentes.length} pra comprar · ${comprados.length} no carrinho`;

  if (itens.length === 0){
    sheet.innerHTML = '<div class="empty-state"><span class="ico">📋</span><p>Lista vazia</p></div>';
    return;
  }

  let html = '<table class="sheet-table"><thead><tr>' +
    '<th class="col-check"></th>' +
    `<th class="col-item sortable${sortBy === 'texto' ? ' sorted' : ''}" data-sort="texto">Item<span class="sort-arrow">${sortArrow('texto')}</span></th>` +
    `<th class="col-qtd sortable${sortBy === 'qtd' ? ' sorted' : ''}" data-sort="qtd">Qtd<span class="sort-arrow">${sortArrow('qtd')}</span></th>` +
    '<th class="col-acao"></th>' +
    '</tr></thead><tbody>';

  if (pendentes.length){
    html += pendentes.map(itemHtml).join('');
  }
  if (comprados.length){
    html += '<tr class="section-head"><td colspan="4">No carrinho</td></tr>';
    html += comprados.map(itemHtml).join('');
    html += '<tr class="clear-row"><td colspan="4"><button class="clear-btn" id="btn-limpar">Limpar marcados</button></td></tr>';
  }

  html += '</tbody></table>';
  sheet.innerHTML = html;

  const table = sheet.querySelector('.sheet-table');
  if (table){
    table.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => setSort(th.dataset.sort));
    });
    table.querySelectorAll('tr.item').forEach(tr => {
      const id = tr.dataset.id;
      tr.querySelector('.cb-excel').addEventListener('click', () => toggle(id));
      tr.querySelector('.del-cell').addEventListener('click', () => remover(id));
    });
    const limpar = $('btn-limpar');
    if (limpar) limpar.addEventListener('click', limparComprados);
  }
}

function itemHtml(item){
  return `<tr class="item${item.feito ? ' feito' : ''}" data-id="${item.id}">
    <td class="col-check">
      <div class="cb-excel">
        <svg viewBox="0 0 24 24"><polyline points="4,13 9,18 20,6"/></svg>
      </div>
    </td>
    <td class="col-item"><span class="item-text">${escapeHtml(item.texto)}</span></td>
    <td class="col-qtd"><span class="qtd-val">${item.qtd}</span></td>
    <td class="col-acao"><button class="del-cell" aria-label="Remover">✕</button></td>
  </tr>`;
}

function toggle(id){
  const item = itens.find(i => i.id === id);
  if (!item) return;
  item.feito = !item.feito;
  render();
  salvarCache();
  sync();
}

function remover(id){
  itens = itens.filter(i => i.id !== id);
  render();
  salvarCache();
  sync();
}

function limparComprados(){
  itens = itens.filter(i => !i.feito);
  render();
  salvarCache();
  sync();
}

function adicionar(texto, qtd){
  itens.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    texto: texto.trim(),
    qtd,
    feito: false,
    criadoEm: Date.now()
  });
  render();
  salvarCache();
  sync();
}

async function sync(){
  if (salvando){ pendente = true; return; }
  salvando = true;
  setStatus('saving');
  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ itens })
    });
    if (!resp.ok){
      const data = await resp.json().catch(() => ({}));
      if (data.error) mostrarBanner(data.error);
      setStatus('erro');
    } else {
      setStatus('ok');
    }
  } catch(e){
    setStatus('erro');
  } finally {
    salvando = false;
    if (pendente){ pendente = false; sync(); }
  }
}

async function buscarRemoto(inicial){
  try {
    const resp = await fetch(API);
    if (!resp.ok){
      const data = await resp.json().catch(() => ({}));
      if (data.error && inicial) mostrarBanner(data.error);
      return;
    }
    const remoto = await resp.json();
    if (Array.isArray(remoto) && JSON.stringify(remoto) !== JSON.stringify(itens)){
      if (!salvando){
        itens = remoto;
        render();
        salvarCache();
      }
    }
    setStatus('ok');
  } catch(e){}
}

// ---- eventos ----
function atualizarQtdInput(){
  $('qtd-valor').value = qtdAtual;
}
$('qtd-menos').addEventListener('click', () => {
  qtdAtual = Math.max(1, qtdAtual - 1);
  atualizarQtdInput();
});
$('qtd-mais').addEventListener('click', () => {
  qtdAtual = Math.min(99, qtdAtual + 1);
  atualizarQtdInput();
});
$('qtd-valor').addEventListener('input', () => {
  const val = parseInt($('qtd-valor').value, 10);
  if (!isNaN(val) && val >= 1 && val <= 99) qtdAtual = val;
});
$('qtd-valor').addEventListener('blur', () => {
  const el = $('qtd-valor');
  if (!el.value || parseInt(el.value,10) < 1) {
    qtdAtual = 1;
    atualizarQtdInput();
  }
});
function submitAdd(){
  const input = $('input-texto');
  const texto = input.value.trim();
  if (!texto) return;
  adicionar(texto, qtdAtual);
  input.value = '';
  qtdAtual = 1;
  atualizarQtdInput();
  input.focus();
}
$('btn-adicionar').addEventListener('click', submitAdd);
$('input-texto').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); submitAdd(); }
});
$('btn-copiar').addEventListener('click', copiarTxt);
$('btn-imprimir').addEventListener('click', () => window.print());

// ---- inicialização ----
carregarCache();
render();
buscarRemoto(true);
setInterval(() => buscarRemoto(false), 4000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') buscarRemoto(false);
});
</script>
</body>
