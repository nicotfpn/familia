<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0d47a1">
  <meta name="description" content="Lista de compras — estilo planilha">
  <meta name="apple-mobile-web-app-title" content="Lista">
  <title>Lista de Compras</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;

      --bg: #e8eaed;
      --surface: #fff;
      --header-bg: #f1f3f4;

      --border: #c4c7c5;
      --border-light: #dadce0;
      --border-faint: #e8eaed;

      --accent: #0d47a1;
      --accent-light: #e3edf7;
      --accent-mid: #8ab4d4;
      --red: #c5221f;
      --red-light: #fce8e6;
      --blue: #1a73e8;
      --blue-light: #e8f0fe;
      --ink: #1f1f1f;
      --ink-muted: #5f6368;
      --ink-soft: #80868b;

      --row-hover: #f8f9fa;
      --radius: 4px;

      --cell-pad: 8px 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1d23;
        --surface: #2d3139;
        --header-bg: #262a30;
        --border: #40444b;
        --border-light: #383c43;
        --border-faint: #30343b;
        --accent: #1976d2;
        --accent-light: #1a2d45;
        --accent-mid: #2a5070;
        --red: #ef5350;
        --red-light: #3d1f1e;
        --blue: #64b5f6;
        --blue-light: #1a3145;
        --ink: #e8eaed;
        --ink-muted: #9aa0a6;
        --ink-soft: #7a7f85;
        --row-hover: #333740;
      }
      .sheet-table th.sorted {
        background: #333740;
      }
    }



    body,
    .topbar,
    .toolbar,
    .actions-bar,
    .sheet-table td,
    .sheet-table th,
    .act-btn,
    .status-dot,
    .cb-excel,
    .modal-box,
    .banner {
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }


    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .topbar-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-light);
    }

    .topbar-title h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .topbar-title h1 .accent {
      color: var(--accent);
    }

    #contador {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-muted);
    }


    .toolbar {
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .toolbar input[type="text"] {
      flex: 1;
      min-width: 0;
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    .toolbar input[type="text"]:focus {
      border-color: var(--accent);
    }

    .toolbar input[type="text"]::placeholder {
      color: var(--ink-soft);
    }

    .qtd-group {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      flex-shrink: 0;
    }

    .qtd-group button {
      width: 28px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--accent);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
    }

    .qtd-group button:active {
      background: var(--accent-light);
    }

    .qtd-group .qtd-input {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      width: 34px;
      text-align: center;
      color: var(--ink);
      border: none;
      background: transparent;
      outline: none;
      padding: 0;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .qtd-group .qtd-input::-webkit-inner-spin-button,
    .qtd-group .qtd-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .add-btn {
      flex-shrink: 0;
      height: 30px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: var(--font);
    }

    .add-btn:active {
      background: #093170;
    }


    .actions-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 4px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      min-height: 30px;
      flex-wrap: wrap;
    }

    .actions-left {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .actions-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 1px;
      background: var(--accent);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-dot.saving {
      background: #f9ab00;
      animation: pulse 1s ease-in-out infinite;
    }

    .status-dot.erro {
      background: var(--red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    #status-texto {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    .act-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 24px;
      padding: 0 8px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink-muted);
      font-family: var(--font);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }
    .act-btn[hidden] { display: none; }

    .act-btn:active {
      background: var(--header-bg);
      border-color: var(--border);
    }

    .act-btn .ico {
      font-size: 0.75rem;
      line-height: 1;
    }

    .act-btn.highlight {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
    }

    #feedback-copy {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #feedback-copy.show {
      opacity: 1;
    }


    .sheet {
      flex: 1;
      overflow-x: auto;
      padding: 0;
    }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .sheet-table th {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: var(--header-bg);
      border-bottom: 2px solid var(--border);
      padding: var(--cell-pad);
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
      user-select: none;
    }

    .sheet-table th:not(:last-child) {
      border-right: 1px solid var(--border-faint);
    }

    .sheet-table th.sorted {
      color: var(--ink);
      background: #e8eaed;
    }

    .sheet-table th.sortable {
      cursor: pointer;
    }

    .sheet-table th.sortable:active {
      background: #dadce0;
    }

    .sort-arrow {
      display: inline-block;
      margin-left: 3px;
      font-size: 0.6rem;
      opacity: 0.5;
    }

    th.sorted .sort-arrow {
      opacity: 1;
    }

    .sheet-table td {
      padding: var(--cell-pad);
      border-bottom: 1px solid var(--border-faint);
      vertical-align: middle;
      background: var(--surface);
      transition: background 0.1s;
    }

    .sheet-table tr:hover td {
      background: var(--row-hover);
    }

    .sheet-table td:not(:last-child) {
      border-right: 1px solid var(--border-faint);
    }

    .col-check {
      width: 42px;
      text-align: center !important;
    }

    .col-qtd {
      width: 60px;
      text-align: center !important;
    }

    .col-acao {
      width: 62px;
      text-align: center !important;
    }

    .item-text {
      font-size: 0.88rem;
      color: var(--ink);
      word-break: break-word;
      display: inline-block;
      position: relative;
      line-height: 1.4;
      padding-left: 2px;
    }

    .item.feito .item-text {
      color: var(--ink-soft);
      text-decoration: line-through;
      text-decoration-color: var(--red);
      text-decoration-thickness: 2px;
    }

    .qtd-val {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--ink);
    }

    .item.feito .qtd-val {
      color: var(--ink-soft);
    }

    .qtd-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .qtd-inline button {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      background: var(--surface);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: var(--font);
      line-height: 1;
    }

    .qtd-inline button:active {
      background: var(--accent-light);
    }

    .qtd-inline .qtd-val {
      min-width: 20px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--ink);
    }

    .item.feito .qtd-inline .qtd-val {
      color: var(--ink-soft);
    }

    .cb-excel {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      flex-shrink: 0;
      position: relative;
    }

    .cb-excel:active {
      border-color: var(--accent);
    }

    .item.feito .cb-excel {
      background: var(--accent);
      border-color: var(--accent);
    }

    .cb-excel svg {
      width: 11px;
      height: 11px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }

    .del-cell {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--ink-soft);
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
    }

    .del-cell:hover {
      background: var(--red-light);
      color: var(--red);
    }


    .section-head td {
      background: var(--accent-light) !important;
      border-bottom: 1px solid var(--accent-mid) !important;
      padding: 4px 10px !important;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      border-right: none !important;
    }

    .section-head:hover td {
      background: var(--accent-light) !important;
    }

    .section-head td:last-child {
      border-right: none !important;
    }

    .clear-row {
      text-align: center;
      padding: 10px 0 20px;
    }

    .clear-btn {
      border: none;
      background: none;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--red);
      padding: 6px 12px;
      cursor: pointer;
      border-radius: var(--radius);
    }

    .clear-btn:active {
      background: var(--red-light);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
    }

    .empty-state .ico {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    .banner {
      margin: 8px 12px 0;
      padding: 8px 12px;
      background: var(--red-light);
      border: 1px solid rgba(197, 34, 31, 0.25);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 0.75rem;
      line-height: 1.4;
      display: none;
    }

    .banner.show {
      display: block;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .sheet-table tbody tr {
      animation: rowIn 0.2s ease-out;
    }


    @media (max-width:500px) {
      .col-qtd {
        width: 48px;
      }

      .col-check {
        width: 36px;
      }

      .col-acao {
        width: 54px;
      }

      .sheet-table th,
      .sheet-table td {
        padding: 6px 6px;
      }

      .topbar-title {
        padding: 4px 8px;
      }

      .toolbar {
        padding: 6px 8px;
      }

      .actions-bar {
        padding: 3px 8px;
      }
    }

    @media (min-width:768px) {
      .page {
        max-width: 860px;
        padding: 0 24px;
      }

      .topbar-title {
        padding: 8px 16px;
      }

      .topbar-title h1 {
        font-size: 0.95rem;
      }

      #contador {
        font-size: 0.75rem;
      }

      .toolbar {
        padding: 12px 16px;
        gap: 10px;
      }

      .toolbar input[type="text"] {
        font-size: 0.95rem;
        padding: 10px 14px;
      }

      .add-btn {
        height: 38px;
        padding: 0 22px;
        font-size: 0.85rem;
      }

      .qtd-group button {
        width: 34px;
        height: 38px;
        font-size: 1.1rem;
      }

      .qtd-group .qtd-input {
        font-size: 0.9rem;
        width: 38px;
      }

      .actions-bar {
        padding: 6px 16px;
      }

      .act-btn {
        height: 28px;
        padding: 0 12px;
        font-size: 0.75rem;
      }

      .item-text {
        font-size: 0.95rem;
      }

      .sheet-table th {
        font-size: 0.7rem;
      }

      .sheet-table td {
        padding: 12px 14px;
      }

      .col-qtd {
        width: 72px;
      }

      .col-acao {
        width: 64px;
      }

      body {
        font-size: 15px;
      }
    }

    @media (min-width:1024px) {
      .page {
        max-width: 1100px;
        padding: 0 32px;
      }

      .topbar-title {
        padding: 10px 20px;
      }

      .toolbar {
        padding: 14px 20px;
        gap: 12px;
      }

      .toolbar input[type="text"] {
        font-size: 1rem;
        padding: 10px 16px;
      }

      .add-btn {
        height: 40px;
        padding: 0 28px;
        font-size: 0.9rem;
        border-radius: 6px;
      }

      .qtd-group button {
        width: 36px;
        height: 40px;
        font-size: 1.15rem;
      }

      .qtd-group .qtd-input {
        font-size: 0.95rem;
        width: 42px;
      }

      .actions-bar {
        padding: 8px 20px;
      }

      .act-btn {
        height: 30px;
        padding: 0 14px;
        font-size: 0.78rem;
        border-radius: 6px;
      }

      .item-text {
        font-size: 1rem;
      }

      .sheet-table th {
        font-size: 0.75rem;
        padding: 12px 16px;
      }

      .sheet-table td {
        padding: 14px 16px;
      }

      .col-qtd {
        width: 100px;
      }

      .col-check {
        width: 48px;
      }

      .col-acao {
        width: 66px;
      }

      body {
        font-size: 15px;
      }

      .qtd-inline button {
        display: inline-flex;
      }
    }


    @media print {
      body {
        background: #fff;
        font-size: 9pt;
        color: #000;
      }

      *,
      *::before,
      *::after {
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      .topbar,
      .toolbar,
      .actions-bar,
      .banner,
      .del-cell,
      .cb-excel,
      .clear-row,
      .section-head,
      .empty-state {
        display: none !important;
      }

      .page {
        max-width: 100%;
        padding: 0;
        min-height: auto;
        margin: 0;
      }

      .sheet {
        overflow: visible;
      }

      .sheet-table {
        page-break-after: auto;
        border-collapse: collapse;
      }

      .sheet-table th {
        background: #fff !important;
        color: #000 !important;
        font-size: 6.5pt;
        font-weight: 600;
        border-bottom: 1px solid #000;
        padding: 2px 4px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .sheet-table td {
        border: none;
        border-bottom: 1px dotted #bbb;
        background: #fff !important;
        padding: 2px 4px;
        font-size: 8pt;
        color: #000;
      }

      .sheet-table tr:hover td {
        background: #fff !important;
      }

      .item.feito .item-text {
        color: #999 !important;
        text-decoration: line-through;
        text-decoration-color: #999;
        text-decoration-thickness: 1px;
      }

      .item-text {
        font-size: 8pt;
        font-weight: 400;
      }

      .qtd-val {
        font-size: 7pt;
      }

      .col-check {
        width: 0;
        overflow: hidden;
        padding: 0 !important;
        border: none !important;
      }

      .col-acao {
        width: 0;
        overflow: hidden;
        padding: 0 !important;
        border: none !important;
      }

      .col-qtd {
        width: 28px;
        text-align: center;
      }

      .col-item {
        padding-left: 2px !important;
      }

      .sheet-table tbody tr {
        animation: none !important;
      }
    }

    @media (prefers-reduced-motion:reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      z-index: 100;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s, visibility 0.15s;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-box {
      background: var(--surface);
      border-radius: 8px;
      padding: 24px 28px 20px;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      text-align: center;
    }
    .modal-msg {
      font-size: 0.9rem;
      color: var(--ink);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .modal-btn {
      min-width: 90px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink-muted);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0 16px;
      transition: all 0.12s;
    }
    .modal-btn:active {
      background: var(--header-bg);
    }
    .modal-btn.danger {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .modal-btn.danger:active {
      background: #a50e0e;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      background: #1f1f1f;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .toast-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .toast-btn:active {
      background: rgba(255,255,255,0.12);
    }

    /* Pin button */
    .pin-cell {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      padding: 0;
      line-height: 1;
      opacity: 0.35;
      vertical-align: middle;
    }
    .pin-cell.ativo {
      opacity: 1;
    }
    .pin-cell:hover {
      background: var(--accent-light);
      opacity: 1;
    }

    @media (max-width:500px) {
      .toast {
        font-size: 0.8rem;
        padding: 8px 12px;
        bottom: 12px;
        max-width: 94%;
        white-space: normal;
      }
      .modal-box {
        padding: 20px 20px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-title">
        <h1>Lista de <span class="accent">Compras</span></h1>
        <span id="contador">carregando…</span>
      </div>

      <div class="toolbar">
        <input type="text" id="input-texto" placeholder="Novo item…" maxlength="80" required>
        <div class="qtd-group">
          <button type="button" id="qtd-menos" aria-label="Diminuir">−</button>
          <input type="number" id="qtd-valor" class="qtd-input" value="1" min="1" max="99">
          <button type="button" id="qtd-mais" aria-label="Aumentar">+</button>
        </div>
        <button type="button" class="add-btn" id="btn-adicionar">Adicionar</button>
      </div>

      <div class="actions-bar">
        <div class="actions-left">
          <button class="act-btn" id="btn-instalar"><span class="ico">⬇️</span> Instalar</button>
          <button class="act-btn highlight" id="btn-whatsapp"><span class="ico">📲</span> WhatsApp</button>
          <button class="act-btn" id="btn-copiar"><span class="ico">📄</span> Copiar TXT</button>
          <button class="act-btn" id="btn-imprimir"><span class="ico">🖨️</span> Imprimir</button>
          <span id="feedback-copy">Copiado!</span>
        </div>
        <div class="actions-right">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-texto">sincronizado</span>
        </div>
      </div>
    </div>

    <div class="banner" id="banner"></div>

    <div class="sheet" id="sheet">
      <div class="empty-state"><span class="ico">📋</span>
        <p>Lista vazia</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-cancel">Cancelar</button>
        <button class="modal-btn danger" id="modal-confirm">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-msg"></span>
    <button class="toast-btn" id="toast-btn">Desfazer</button>
  </div>

  <script>
    const API = '/api/lista';
    const CACHE_KEY = 'lista-familia-cache-v1';
    let itens = [];
    let qtdAtual = 1;
    let salvando = false;
    let pendente = false;
    let sortBy = 'criadoEm';
    let sortDir = 'asc';
    let resolveModal = null;
    let toastTimer = null;
    let undoData = null;

    const sheet = document.getElementById('sheet');
    const contador = document.getElementById('contador');
    const statusDot = document.getElementById('status-dot');
    const statusTexto = document.getElementById('status-texto');
    const banner = document.getElementById('banner');
    const feedbackCopy = document.getElementById('feedback-copy');

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": "&#39;" }[c];
      });
    }

    function mostrarBanner(msg) {
      banner.textContent = msg;
      banner.classList.add('show');
    }

    function setStatus(estado) {
      statusDot.className = 'status-dot' + (estado === 'ok' ? '' : ' ' + estado);
      statusTexto.textContent = estado === 'ok' ? 'sincronizado'
        : estado === 'saving' ? 'salvando…'
          : 'erro ao salvar';
    }

    function salvarCache() {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(itens)); } catch (e) { }
    }

    function carregarCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (raw) { itens = JSON.parse(raw); render(); }
      } catch (e) { }
    }

    function setSort(campo) {
      if (sortBy === campo) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortBy = campo;
        sortDir = campo === 'texto' ? 'asc' : (campo === 'qtd' ? 'desc' : 'asc');
      }
      render();
    }

    function sortArrow(campo) {
      if (sortBy !== campo) return '';
      return sortDir === 'asc' ? ' ▲' : ' ▼';
    }

    function gerarTexto() {
      const pendentes = itens.filter(i => !i.feito);
      const comprados = itens.filter(i => i.feito);
      const linhas = [];
      linhas.push('LISTA DE COMPRAS');
      linhas.push('━'.repeat(30));
      linhas.push('');
      if (pendentes.length) {
        linhas.push('📌 PRA COMPRAR');
        pendentes.forEach((item, i) => {
          linhas.push(`  ${i + 1}. ${item.texto}${item.qtd > 1 ? ` (qtd: ${item.qtd})` : ''}`);
        });
        linhas.push('');
      }
      if (comprados.length) {
        linhas.push('✅ NO CARRINHO');
        comprados.forEach((item, i) => {
          linhas.push(`  ${i + 1}. ${item.texto}${item.qtd > 1 ? ` (qtd: ${item.qtd})` : ''}`);
        });
        linhas.push('');
      }
      if (!itens.length) {
        linhas.push('  (lista vazia)');
        linhas.push('');
      }
      linhas.push('━'.repeat(30));
      return linhas.join('\n');
    }

    function copiarTxt() {
      const texto = gerarTexto();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(texto).then(() => mostrarCopiado());
      } else {
        const ta = document.createElement('textarea');
        ta.value = texto;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); mostrarCopiado(); } catch (e) { }
        document.body.removeChild(ta);
      }
    }

    function mostrarCopiado() {
      feedbackCopy.classList.add('show');
      setTimeout(() => feedbackCopy.classList.remove('show'), 2000);
    }

    function enviarWhatsApp() {
      const texto = gerarTexto();
      const url = 'https://wa.me/?text=' + encodeURIComponent(texto);
      window.open(url, '_blank', 'noopener');
    }

    function confirmarAcao(msg) {
      return new Promise(function (resolve) {
        if (document.getElementById('modal').classList.contains('show')) {
          resolve(false);
          return;
        }
        resolveModal = resolve;
        document.getElementById('modal-msg').textContent = msg;
        document.getElementById('modal').classList.add('show');
      });
    }

    function modalConfirmar() {
      document.getElementById('modal').classList.remove('show');
      if (resolveModal) { resolveModal(true); resolveModal = null; }
    }

    function modalCancelar() {
      document.getElementById('modal').classList.remove('show');
      if (resolveModal) { resolveModal(false); resolveModal = null; }
    }

    function mostrarToastUndo(msg, removidos) {
      if (toastTimer) clearTimeout(toastTimer);
      undoData = removidos;
      document.getElementById('toast-msg').textContent = msg;
      document.getElementById('toast').classList.add('show');
      toastTimer = setTimeout(esconderToast, 6000);
    }

    function esconderToast() {
      document.getElementById('toast').classList.remove('show');
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
      undoData = null;
    }

    function desfazerUndo() {
      try {
        if (!undoData) return;
        var data = undoData.slice().sort(function (a, b) {
          return a.indiceOriginal - b.indiceOriginal;
        });
        for (var i = 0; i < data.length; i++) {
          itens.splice(data[i].indiceOriginal + i, 0, data[i].item);
        }
        esconderToast();
        render();
        salvarCache();
        sync();
      } catch (e) {
        esconderToast();
      }
    }

    function togglePin(id) {
      try {
        for (var i = 0; i < itens.length; i++) {
          if (itens[i].id === id) {
            itens[i].fixado = !itens[i].fixado;
            render();
            salvarCache();
            sync();
            return;
          }
        }
      } catch (e) { }
    }

    function render() {
      for (var i = 0; i < itens.length; i++) {
        if (itens[i].fixado == null) itens[i].fixado = false;
      }

      const cmp = (a, b) => {
        let diff;
        if (sortBy === 'texto') diff = a.texto.localeCompare(b.texto, 'pt-BR');
        else if (sortBy === 'qtd') diff = a.qtd - b.qtd;
        else diff = a.criadoEm - b.criadoEm;
        return sortDir === 'asc' ? diff : -diff;
      };

      const fixados = [];
      const pendentes = [];
      const comprados = [];
      for (var i = 0; i < itens.length; i++) {
        const item = itens[i];
        if (item.feito) {
          comprados.push(item);
        } else if (item.fixado) {
          fixados.push(item);
        } else {
          pendentes.push(item);
        }
      }
      pendentes.sort(cmp);
      comprados.sort(cmp);

      contador.textContent = itens.length === 0 ? 'nenhum item'
        : `${pendentes.length + fixados.length} pra comprar · ${comprados.length} no carrinho`;

      if (itens.length === 0) {
        sheet.innerHTML = '<div class="empty-state"><span class="ico">📋</span><p>Lista vazia</p></div>';
        return;
      }

      let html = '<table class="sheet-table"><thead><tr>' +
        '<th class="col-check"></th>' +
        `<th class="col-item sortable${sortBy === 'texto' ? ' sorted' : ''}" data-sort="texto">Item<span class="sort-arrow">${sortArrow('texto')}</span></th>` +
        `<th class="col-qtd sortable${sortBy === 'qtd' ? ' sorted' : ''}" data-sort="qtd">Qtd<span class="sort-arrow">${sortArrow('qtd')}</span></th>` +
        '<th class="col-acao"></th>' +
        '</tr></thead><tbody>';

      if (fixados.length) {
        html += '<tr class="section-head"><td colspan="4">📌 Fixados</td></tr>';
        html += fixados.map(itemHtml).join('');
      }

      if (pendentes.length) {
        html += pendentes.map(itemHtml).join('');
      }
      if (comprados.length) {
        html += '<tr class="section-head"><td colspan="4">No carrinho</td></tr>';
        html += comprados.map(itemHtml).join('');
        html += '<tr class="clear-row"><td colspan="4"><button class="clear-btn" id="btn-limpar">Limpar marcados</button></td></tr>';
      }

      html += '</tbody></table>';
      sheet.innerHTML = html;

      const table = sheet.querySelector('.sheet-table');
      if (table) {
        table.querySelectorAll('th.sortable').forEach(th => {
          th.addEventListener('click', () => setSort(th.dataset.sort));
        });
        table.querySelectorAll('tr.item').forEach(tr => {
          const id = tr.dataset.id;
          tr.querySelector('.cb-excel').addEventListener('click', () => toggle(id));
          tr.querySelector('.del-cell').addEventListener('click', () => remover(id));
          const pinCell = tr.querySelector('.pin-cell');
          if (pinCell) pinCell.addEventListener('click', () => togglePin(id));
          const qtdMenos = tr.querySelector('.qtd-menos');
          const qtdMais = tr.querySelector('.qtd-mais');
          if (qtdMenos) qtdMenos.addEventListener('click', () => mudarQtd(id, -1));
          if (qtdMais) qtdMais.addEventListener('click', () => mudarQtd(id, 1));
        });
        const limpar = document.getElementById('btn-limpar');
        if (limpar) limpar.addEventListener('click', limparComprados);
      }
    }

    function itemHtml(item) {
      return `<tr class="item${item.feito ? ' feito' : ''}" data-id="${item.id}">
    <td class="col-check">
      <div class="cb-excel">
        <svg viewBox="0 0 24 24"><polyline points="4,13 9,18 20,6"/></svg>
      </div>
    </td>
    <td class="col-item"><span class="item-text">${escapeHtml(item.texto)}</span></td>
    <td class="col-qtd">
      <span class="qtd-inline">
        <button class="qtd-menos" aria-label="Diminuir">−</button>
        <span class="qtd-val">${item.qtd}</span>
        <button class="qtd-mais" aria-label="Aumentar">+</button>
      </span>
    </td>
    <td class="col-acao">
      <button class="pin-cell${item.fixado ? ' ativo' : ''}" aria-label="Fixar">📌</button>
      <button class="del-cell" aria-label="Remover">✕</button>
    </td>
  </tr>`;
    }

    function toggle(id) {
      const item = itens.find(i => i.id === id);
      if (!item) return;
      item.feito = !item.feito;
      render();
      salvarCache();
      sync();
    }

    function remover(id) {
      var idx = -1;
      for (var i = 0; i < itens.length; i++) {
        if (itens[i].id === id) { idx = i; break; }
      }
      if (idx === -1) return;
      var item = itens[idx];
      confirmarAcao('Remover "' + item.texto + '"?').then(function (ok) {
        if (!ok) return;
        var removido = itens.splice(idx, 1)[0];
        render();
        salvarCache();
        sync();
        mostrarToastUndo('Item removido', [{ item: removido, indiceOriginal: idx }]);
      });
    }

    function limparComprados() {
      var comprados = [];
      for (var i = itens.length - 1; i >= 0; i--) {
        if (itens[i].feito) comprados.push(itens[i]);
      }
      if (comprados.length === 0) return;
      var msg = comprados.length === 1 ? 'Remover 1 item marcado?' : 'Remover ' + comprados.length + ' itens marcados?';
      confirmarAcao(msg).then(function (ok) {
        if (!ok) return;
        var removidos = [];
        for (var i = itens.length - 1; i >= 0; i--) {
          if (itens[i].feito) {
            removidos.push({ item: itens[i], indiceOriginal: i });
            itens.splice(i, 1);
          }
        }
        render();
        salvarCache();
        sync();
        var msg2 = removidos.length === 1 ? '1 item removido' : removidos.length + ' itens removidos';
        mostrarToastUndo(msg2, removidos);
      });
    }

    function mudarQtd(id, delta) {
      const item = itens.find(i => i.id === id);
      if (!item) return;
      item.qtd = Math.max(1, Math.min(99, item.qtd + delta));
      render();
      salvarCache();
      sync();
    }

    function adicionar(texto, qtd) {
      const t = texto.trim();
      itens.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        texto: t.charAt(0).toUpperCase() + t.slice(1),
        qtd,
        feito: false,
        fixado: false,
        criadoEm: Date.now()
      });
      render();
      salvarCache();
      sync();
    }

    async function sync() {
      if (salvando) { pendente = true; return; }
      salvando = true;
      setStatus('saving');
      try {
        const resp = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ itens })
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          if (data.error) mostrarBanner(data.error);
          setStatus('erro');
        } else {
          setStatus('ok');
        }
      } catch (e) {
        setStatus('erro');
      } finally {
        salvando = false;
        if (pendente) { pendente = false; sync(); }
      }
    }

    async function buscarRemoto(inicial) {
      try {
        const resp = await fetch(API);
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          if (data.error && inicial) mostrarBanner(data.error);
          return;
        }
        const remoto = await resp.json();
        if (Array.isArray(remoto) && JSON.stringify(remoto) !== JSON.stringify(itens)) {
          if (!salvando) {
            itens = remoto;
            render();
            salvarCache();
          }
        }
        setStatus('ok');
      } catch (e) { }
    }


    function atualizarQtdInput() {
      document.getElementById('qtd-valor').value = qtdAtual;
    }
    document.getElementById('qtd-menos').addEventListener('click', () => {
      qtdAtual = Math.max(1, qtdAtual - 1);
      atualizarQtdInput();
    });
    document.getElementById('qtd-mais').addEventListener('click', () => {
      qtdAtual = Math.min(99, qtdAtual + 1);
      atualizarQtdInput();
    });
    document.getElementById('qtd-valor').addEventListener('input', () => {
      const val = parseInt(document.getElementById('qtd-valor').value, 10);
      if (!isNaN(val) && val >= 1 && val <= 99) qtdAtual = val;
    });
    document.getElementById('qtd-valor').addEventListener('blur', () => {
      const el = document.getElementById('qtd-valor');
      if (!el.value || parseInt(el.value, 10) < 1) {
        qtdAtual = 1;
        atualizarQtdInput();
      }
    });
    function submitAdd() {
      const input = document.getElementById('input-texto');
      const texto = input.value.trim();
      if (!texto) return;
      adicionar(texto, qtdAtual);
      input.value = '';
      qtdAtual = 1;
      atualizarQtdInput();
      input.focus();
    }
    document.getElementById('btn-adicionar').addEventListener('click', submitAdd);
    document.getElementById('input-texto').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitAdd(); }
    });
    document.getElementById('btn-copiar').addEventListener('click', copiarTxt);
    document.getElementById('btn-imprimir').addEventListener('click', () => window.print());
    document.getElementById('btn-whatsapp').addEventListener('click', enviarWhatsApp);

    document.getElementById('modal-cancel').addEventListener('click', modalCancelar);
    document.getElementById('modal-confirm').addEventListener('click', modalConfirmar);
    document.getElementById('modal').addEventListener('click', function (e) {
      if (e.target === this) modalCancelar();
    });
    document.getElementById('toast-btn').addEventListener('click', desfazerUndo);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }

    let deferredPrompt = null;
    const btnInstalar = document.getElementById('btn-instalar');
    const jaInstalado = window.matchMedia('(display-mode: standalone)').matches;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    if (jaInstalado) {
      btnInstalar.hidden = true;
    } else {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btnInstalar.hidden = false;
      });

      if (isIOS) {
        btnInstalar.hidden = false;
      }

      btnInstalar.addEventListener('click', async () => {
        if (deferredPrompt) {
          btnInstalar.hidden = true;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
        } else if (isIOS) {
          btnInstalar.innerHTML = '<span class="ico">⬇️</span> Compartilhe → Adicionar à Tela de Início';
          btnInstalar.disabled = true;
          setTimeout(() => btnInstalar.hidden = true, 6000);
        } else {
          btnInstalar.innerHTML = '<span class="ico">⬇️</span> Indisponível neste navegador';
          btnInstalar.disabled = true;
          setTimeout(() => btnInstalar.hidden = true, 3000);
        }
      });
    }

    carregarCache();
    render();
    buscarRemoto(true);
    setInterval(() => buscarRemoto(false), 4000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') buscarRemoto(false);
    });

  </script>
</body>

</html>
